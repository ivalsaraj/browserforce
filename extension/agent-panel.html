<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserForce Agent</title>
  <link rel="stylesheet" href="agent-panel.css">
</head>
<body>
  <main class="agent-shell">
    <header class="agent-header">
      <div class="controls">
        <button id="bf-model-trigger" type="button" class="pill-btn" aria-expanded="false" aria-haspopup="listbox">
          <span id="bf-model-label">Model: Default</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>

        <button id="bf-session-trigger" type="button" class="pill-btn" aria-expanded="false" aria-haspopup="listbox">
          <span id="bf-session-label">Session</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>

        <button id="bf-plugin-trigger" type="button" class="pill-btn" aria-expanded="false" aria-haspopup="listbox">
          <span id="bf-plugin-label">Plugins</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>

        <button id="bf-new-session" type="button" class="round-btn" aria-label="New Session" title="New Session">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
          </svg>
        </button>

        <div id="bf-agent-status" class="status-circle" title="Starting...">
          <span id="bf-agent-status-icon" class="status-dot" aria-hidden="true"></span>
          <span id="bf-agent-status-text" class="sr-only">Starting...</span>
        </div>
      </div>
      <div id="bf-tab-attach-banner" class="tab-attach hidden" role="status" aria-live="polite">
        <span id="bf-tab-attach-text">Current tab is not connected</span>
        <button id="bf-attach-current-tab" type="button" class="tab-attach-btn">Attach current tab</button>
      </div>
    </header>

    <section class="chat">
      <div id="bf-transcript" class="transcript"></div>
      <form id="bf-chat-form" class="composer-wrap">
        <div id="bf-queued-row" class="queued-row" hidden>
          <div class="queued-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 6h13M8 12h9M8 18h13"></path>
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h.01M3 12h.01M3 18h.01"></path>
            </svg>
          </div>
          <p id="bf-queued-text" class="queued-row-text"></p>
          <div class="queued-row-actions">
            <button id="bf-queued-steer" type="button" class="queued-steer-btn" title="Send queued follow-up now">Steer</button>
            <button id="bf-queued-delete" type="button" class="queued-delete-btn" aria-label="Delete queued follow-up" title="Delete queued follow-up">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 6h18"></path>
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 6V4h8v2"></path>
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 6l-1 14H6L5 6"></path>
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 11v6M14 11v6"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="bf-upload-row" class="upload-row" hidden>
          <div class="upload-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21.44 11.05-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.2a3 3 0 1 1 4.24 4.25L9.41 17.4a1 1 0 0 1-1.42-1.41l8.49-8.48"></path>
            </svg>
          </div>
          <p id="bf-upload-text" class="upload-row-text"></p>
          <div class="upload-row-actions">
            <button id="bf-upload-clear" type="button" class="upload-clear-btn" aria-label="Clear selected images" title="Clear selected images">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18 6 6 18"></path>
                <path stroke-linecap="round" stroke-linejoin="round" d="m6 6 12 12"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="composer-box">
          <button id="bf-sheet-selection" type="button" class="sheet-selection-pill" hidden aria-label="Active sheet selection"></button>
          <textarea id="bf-chat-input" class="composer-textarea" rows="1" placeholder="Ask anything"></textarea>
          <input id="bf-image-upload-input" type="file" accept="image/*" multiple hidden>
          <div class="composer-actions">
            <button id="bf-image-upload-btn" type="button" class="btn-upload" aria-label="Upload images" title="Upload images">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m21.44 11.05-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.2a3 3 0 1 1 4.24 4.25L9.41 17.4a1 1 0 0 1-1.42-1.41l8.49-8.48"></path>
              </svg>
            </button>
            <button id="bf-stop-run" type="button" class="btn-stop" aria-label="Stop" title="Stop" disabled hidden>
              <svg class="icon-stop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="10"></circle>
                <rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" stroke="none"></rect>
              </svg>
            </button>
            <button id="bf-send-btn" type="submit" class="btn-send" aria-label="Send" title="Send" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 19V5m0 0l-6 6m6-6l6 6"></path>
              </svg>
            </button>
          </div>
        </div>
        <div id="bf-context-usage" class="context-usage-note hidden" aria-live="polite"></div>
      </form>
    </section>

    <div id="bf-popover-backdrop" class="popover-backdrop hidden"></div>

    <section id="bf-model-panel" class="popover-panel hidden" role="listbox" aria-label="Available models">
      <p class="popover-label">Available Models</p>
      <ul id="bf-model-list" class="popover-list"></ul>
      <p class="popover-label">Thinking Level</p>
      <ul id="bf-thinking-list" class="popover-list"></ul>
    </section>

    <section id="bf-session-panel" class="popover-panel hidden" role="listbox" aria-label="Sessions">
      <p class="popover-label">Sessions</p>
      <ul id="bf-switch-session-list" class="popover-list"></ul>
    </section>

    <section id="bf-plugin-panel" class="popover-panel hidden" role="listbox" aria-label="Plugins">
      <p class="popover-label">Plugins</p>
      <ul id="bf-plugin-list" class="popover-list"></ul>
    </section>
  </main>

  <script type="module" src="agent-panel.js"></script>
</body>
</html>
